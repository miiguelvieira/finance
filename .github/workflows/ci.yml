name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install test extras
        run: pip install dash-bootstrap-components plotly

      - name: Run all tests
        env:
          DATABASE_URL: "sqlite:///:memory:"
          DASH_PORT: "8050"
          API_PORT:  "8000"
        run: |
          python tests/test_core.py
          python tests/test_accounts.py
          python tests/test_transactions.py
          python tests/test_installments.py
          python tests/test_projections.py
          python tests/test_tax_engine.py
          python tests/test_investments.py
          python tests/test_pluggy.py
          python tests/test_chatbot.py
          python tests/test_dashboard.py
          python tests/test_desktop.py

  build-exe:
    name: Build Windows Executable
    runs-on: windows-latest
    needs: test
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller pywebview dash-bootstrap-components plotly

      - name: Build executable
        run: pyinstaller desktop/build.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: finance-windows-${{ github.sha }}
          path: dist/finance/
          retention-days: 30

  release:
    name: Create Release
    runs-on: windows-latest
    needs: build-exe
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: finance-windows-${{ github.sha }}
          path: dist/finance/

      - name: Zip executable
        run: Compress-Archive -Path dist/finance/* -DestinationPath finance-windows.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: finance-windows.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
