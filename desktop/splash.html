<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Finance Personal — Carregando...</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f172a;
    color: #f8fafc;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    overflow: hidden;
  }

  .logo {
    font-size: 3rem;
    margin-bottom: 12px;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1);   opacity: 1; }
    50%       { transform: scale(1.08); opacity: 0.85; }
  }

  .brand {
    font-size: 1.6rem;
    font-weight: 700;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }

  .tagline {
    font-size: 0.85rem;
    color: rgba(255,255,255,0.35);
    text-transform: uppercase;
    letter-spacing: 2.5px;
    margin-bottom: 48px;
  }

  .spinner-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }

  .spinner {
    width: 36px;
    height: 36px;
    border: 3px solid rgba(59,130,246,0.2);
    border-top-color: #3b82f6;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .status {
    font-size: 0.8rem;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.5px;
  }

  .dots::after {
    content: '';
    animation: dots 1.5s steps(4, end) infinite;
  }

  @keyframes dots {
    0%   { content: '';    }
    25%  { content: '.';   }
    50%  { content: '..';  }
    75%  { content: '...'; }
  }

  .version {
    position: fixed;
    bottom: 20px;
    right: 24px;
    font-size: 0.7rem;
    color: rgba(255,255,255,0.15);
  }
</style>
</head>
<body>
  <div class="logo">💰</div>
  <div class="brand">Finance Personal</div>
  <div class="tagline">Gestão Financeira</div>

  <div class="spinner-wrap">
    <div class="spinner"></div>
    <div class="status">Iniciando<span class="dots"></span></div>
  </div>

  <div class="version">v1.0</div>
</body>
</html>
